    <style>
      /* Critical CSS for faster load */
      :root {
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-left: env(safe-area-inset-left, 0px);
        --safe-area-inset-right: env(safe-area-inset-right, 0px);
        color-scheme: dark;
      }
      
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      
      html {
        background-color: #020617;
        height: 100%;
        width: 100%;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: #020617;
        color: #ffffff;
        font-family: 'Cairo', 'Almarai', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100%;
        min-height: 100dvh;
        overscroll-behavior-y: contain;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      #root {
        min-height: 100%;
        min-height: 100dvh;
        padding-top: var(--safe-area-inset-top);
        padding-bottom: var(--safe-area-inset-bottom);
        padding-left: var(--safe-area-inset-left);
        padding-right: var(--safe-area-inset-right);
      }
      
      /* Loading Screen */
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        z-index: 9999;
      }
      
      .app-loading-logo {
        width: 100px;
        height: 100px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .app-loading-text {
        margin-top: 20px;
        font-size: 24px;
        font-weight: 800;
        background: linear-gradient(90deg, #84cc16, #22c55e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        margin-top: 30px;
        border: 3px solid rgba(132, 204, 22, 0.2);
        border-top-color: #84cc16;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Hide loading when app is ready */
      .app-ready .app-loading {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق</noscript>
    
    <!-- Loading Screen -->
    <div class="app-loading" id="app-loading">
      <img src="%PUBLIC_URL%/logo192.png" alt="Koora Voice" class="app-loading-logo" />
      <div class="app-loading-text">صوت الكورة</div>
      <div class="app-loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.body.classList.add('app-ready');
          setTimeout(function() {
            var loading = document.getElementById('app-loading');
            if (loading) loading.style.display = 'none';
          }, 300);
        }, 500);
      });
      
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function() {});
        });
      }
    </script>
  </body>
