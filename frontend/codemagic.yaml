workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.kooravoice.voice
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18.17.0
    scripts:
      - name: Set build number
        script: |
          cd frontend/ios/App
          BUILD_NUM=68
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" App/Info.plist
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUM/g" App.xcodeproj/project.pbxproj
          echo "Build number set to $BUILD_NUM"
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build React app
        script: |
          cd frontend
          CI=false npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios --deployment
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod repo update
          pod install --repo-update
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - frontend/ios/App/*.ipa
      - /tmp/xcodebuild_logs/*.log
