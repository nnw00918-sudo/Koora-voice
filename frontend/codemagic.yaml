workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.kooravoice.voice
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18.17.0
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build React app
        script: |
          cd frontend
          CI=false npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Increment build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all 13
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - frontend/ios/App/*.ipa
      - /tmp/xcodebuild_logs/*.log
